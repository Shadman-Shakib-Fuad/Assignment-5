<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issue Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage" class="login-page">

<div class="login-card">

<img src="github-logo.png" class="logo-img">

<h1>GitHub Issues</h1>
<p class="sub">Track and manage project issues</p>

<input id="username" type="text" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<p class="demo">
Demo → Username: <b>admin</b> Password: <b>admin123</b>
</p>

</div>
</div>

<div id="mainPage" class="main-page hidden">
<nav class="navbar">

<div class="nav-left">

<img src="github-logo.png" class="nav-logo">
<h2>Issue Tracker</h2>

</div>

<div class="nav-right">

<input id="searchInput" type="text" placeholder="Search Issue">

<button onclick="searchIssue()">Search</button>

<button class="new-btn">New Issue</button>

</div>

</nav>

</div>

<script src="script.js"></script>

</body>
</html>
