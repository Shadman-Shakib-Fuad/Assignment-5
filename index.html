<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issue Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage" class="login-page">

<div class="login-card">

<img src="github-logo.png" class="logo-img">

<h1>GitHub Issues</h1>
<p class="sub">Track and manage project issues</p>

<input id="username" type="text" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<p class="demo">
Demo → Username: <b>admin</b> Password: <b>admin123</b>
</p>

</div>
</div>

<div id="mainPage" class="main-page hidden">
<nav class="navbar">

<div class="nav-left">

<img src="github-logo.png" class="nav-logo">
<h2>Issue Tracker</h2>

</div>

<div class="nav-right">

<input id="searchInput" type="text" placeholder="Search Issue">

<button onclick="searchIssue()">Search</button>

<button class="new-btn">New Issue</button>

</div>

</nav>

<div class="tabs">

<button class="tab active" onclick="filterIssues('all',event)">All</button>
<button class="tab" onclick="filterIssues('open',event)">Open</button>
<button class="tab" onclick="filterIssues('closed',event)">Closed</button>

</div>

<div class="issue-count">

<span id="issueNumber">0 Issues Found</span>

<div class="markers">
<span class="open-marker">Open</span>
<span class="closed-marker">Closed</span>
</div>

</div>

<div id="loader" class="loader hidden"></div>

<div id="issueContainer" class="issues-grid"></div>

</div>

<div id="modal" class="modal hidden">

<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h2 id="modalTitle"></h2>

<p id="modalDesc"></p>

<p><b>Status:</b> <span id="modalStatus"></span></p>

<p><b>Author:</b> <span id="modalAuthor"></span></p>

<p><b>Priority:</b> <span id="modalPriority"></span></p>

<p><b>Created:</b> <span id="modalDate"></span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
